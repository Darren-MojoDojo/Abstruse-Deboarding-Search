<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Search</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="search-wrap">
    <input
      id="search"
      type="search"
      placeholder="Search organisations…"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <div id="results" role="listbox" aria-label="Organisations"></div>

  <div id="status" class="status" hidden></div>

  <footer>
    <span class="hint"><kbd>↑</kbd><kbd>↓</kbd></span>
    <span class="hint"><kbd>↵</kbd> open</span>
    <span class="hint"><kbd>⇧</kbd><kbd>↵</kbd> alt</span>
    <span class="hint"><kbd>esc</kbd></span>
    <button id="settings-btn" type="button" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path fill="currentColor" d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
      </svg>
    </button>
  </footer>

  <div id="settings-overlay" hidden>
    <div id="settings-panel">
      <header class="settings-header">
        <h2>Settings</h2>
        <button type="button" id="settings-close" aria-label="Close">×</button>
      </header>
      <label class="settings-row">
        <span>Tenant slug</span>
        <input id="setting-tenant" type="text" placeholder="mojodojo" autocomplete="off" />
      </label>
      <p class="settings-hint">Used to build the SimpleOnboarding URL (e.g. <code>new.simpleonboarding.com.au/<strong>mojodojo</strong>/…</code>).</p>
      <label class="settings-row">
        <span>Default page path (Enter)</span>
        <input id="setting-page" type="text" placeholder="projects" autocomplete="off" />
      </label>
      <p class="settings-hint">Opened with <kbd>↵</kbd>. Sub-path after <code>/client/&lt;orgID&gt;/</code>. Default: <code>projects</code>.</p>
      <label class="settings-row">
        <span>Alternate page path (Shift+Enter)</span>
        <input id="setting-alt-page" type="text" placeholder="credentials" autocomplete="off" />
      </label>
      <p class="settings-hint">Opened with <kbd>⇧</kbd>+<kbd>↵</kbd>. Default: <code>credentials</code>.</p>
      <div class="settings-actions">
        <button type="button" id="settings-cancel">Cancel</button>
        <button type="button" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
